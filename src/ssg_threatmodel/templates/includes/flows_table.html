<details>
<summary>Show data flows</summary>
<table>
    <thead>
        <tr>
            <th>Flow ID</th>
            <th>Source</th>
            <th>Sink</th>
            <th>Type</th>
        </tr>
    </thead>
    <tbody>
        {% for flow in scenario.flows %}
        <tr>
            <td>{{ loop.index }}. {{ flow.id }}</td>
            <td>{{ flow.source }}</td>
            <td>{{ flow.sink }}</td>
            <td>
                {% if flow.is_response %}
                Response to {{ flow.response_to }}
                {% else %}
                Request
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</details>
